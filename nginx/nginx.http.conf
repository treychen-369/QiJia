events {
    worker_connections 1024;
}

http {
    upstream app {
        server app:3000;
        keepalive 32;
    }

    # 限制请求速率
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # 基本配置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ============================================
    # 安全防护：拦截恶意扫描和攻击请求
    # ============================================
    map $http_user_agent $is_bad_agent {
        default 0;
        "~*Assetnote" 1;
        "~*Nmap" 1;
        "~*sqlmap" 1;
        "~*nikto" 1;
        "~*dirbuster" 1;
        "~*gobuster" 1;
        "~*masscan" 1;
        "~*zgrab" 1;
        "~*censys" 1;
        "~*nuclei" 1;
        "~*libredtail" 1;
    }

    # HTTP服务器（用于临时访问或测试）
    server {
        listen 80;
        server_name _;

        # --- 安全拦截规则 ---

        # 1. 拦截恶意 User-Agent
        if ($is_bad_agent) {
            return 403;
        }

        # 2. 拦截常见漏洞扫描路径
        location ~* ^/(cgi-bin|phpMyAdmin|phpmyadmin|pma|wp-admin|wp-login|wp-content|xmlrpc|actuator|console|manager|solr|sdk|shell|setup|install) {
            access_log off;
            return 444;
        }

        # 3. 拦截路径遍历攻击
        location ~* (\.\./|\.\.) {
            access_log off;
            return 444;
        }

        # 4. 拦截 PHP 文件请求（本项目无 PHP）
        location ~* \.php$ {
            access_log off;
            return 444;
        }

        # 5. 拦截敏感文件请求
        location ~* \.(env|git|svn|htaccess|htpasswd|bak|old|backup|sql|dump)$ {
            access_log off;
            return 444;
        }

        # --- 正常业务路由 ---

        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://app;
        }

        # AI 相关 API（DeepSeek 调用耗时长，超时设为 5 分钟）
        location /api/allocation/ai-advice {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }

        # API路由限制
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 登录路由限制
        location /api/auth/ {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 主应用
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
