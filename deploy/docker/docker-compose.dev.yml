# ============================================
# 开发环境覆盖配置
# ============================================
# 使用方式：
# docker-compose -f deploy/docker/docker-compose.yml -f deploy/docker/docker-compose.dev.yml up -d
# ============================================

services:
  postgres:
    # 开发环境暴露数据库端口，方便调试
    ports:
      - "5432:5432"

  redis:
    # 开发环境暴露 Redis 端口
    ports:
      - "6379:6379"

  app:
    # 开发环境直接暴露应用端口
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=DEBUG
    # 开发环境挂载脚本目录
    volumes:
      - ../../scripts:/app/scripts:ro

  nginx:
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
