# ============================================
# 兼容性文件 - 重定向到新配置位置
# ============================================
# 新的配置文件位于 deploy/docker/ 目录
# 
# 推荐使用方式：
#   ./deploy/scripts/deploy.sh [dev|prod|http]
#
# 或者直接使用 docker-compose：
#   docker-compose -f deploy/docker/docker-compose.yml -f deploy/docker/docker-compose.prod.yml up -d
#
# 此文件保留仅为向后兼容，使用简化配置
# ============================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: finance-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finance_system}
      POSTGRES_USER: ${POSTGRES_USER:-finance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - finance-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: finance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finance-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-app
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-finance_user}:${POSTGRES_PASSWORD:-finance_password}@postgres:5432/${POSTGRES_DB:-finance_system}
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - SECURITIES_API_ENABLED=${SECURITIES_API_ENABLED:-false}
      - SECURITIES_API_KEY=${SECURITIES_API_KEY:-}
      - SECURITIES_API_ENDPOINT=${SECURITIES_API_ENDPOINT:-https://api.tushare.pro}
      - SECURITIES_API_PROVIDER=${SECURITIES_API_PROVIDER:-tushare}
      - SECURITIES_API_RATE_LIMIT=${SECURITIES_API_RATE_LIMIT:-60}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - finance-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  finance-network:
    driver: bridge
